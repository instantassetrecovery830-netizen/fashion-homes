<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>React App</title>
  </head>
  <body>
    <div id="root"></div>

    <script type="module">
      import React from "https://esm.sh/react@18";
      import ReactDOM from "https://esm.sh/react-dom@18/client";
      import App from "./App.jsx";

      const root = ReactDOM.createRoot(
        document.getElementById("root")
      );
      root.render(<App />);
    </script>
  </body>
</html>
