
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyFitStore | Luxury Fashion Ecosystem</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap"
      rel="stylesheet"
    >

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              luxury: {
                black: '#0a0a0a',
                charcoal: '#1A1A1A',
                gold: '#C5A059',
                'gold-hover': '#B08D48',
                cream: '#FDFCF8',
                'cream-dark': '#F5F2EA',
                taupe: '#8B8580',
                burgundy: '#4A0404',
                sage: '#9CAF88',
                clay: '#BA6B56',
                navy: '#1B2432',
                silver: '#E5E5E5'
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
            animation: {
              'fade-in': 'fadeIn 0.8s ease-out forwards',
              'slide-up': 'slideUp 0.8s ease-out forwards',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { transform: 'translateY(20px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              }
            }
          }
        }
      }
    </script>

    <!-- Babel Standalone for in-browser JSX/TSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Polyfill process.env for Gemini Service -->
    <script>
      window.process = {
        env: {
          API_KEY: '', // API Key will be injected by the environment or replaced manually
          NODE_ENV: 'development'
        }
      };
    </script>

    <!-- ✅ IMPORT MAP -->
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
    "react/jsx-dev-runtime": "https://esm.sh/react@18.3.1/jsx-dev-runtime",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "firebase/app": "https://esm.sh/firebase@10.13.1/app",
    "firebase/auth": "https://esm.sh/firebase@10.13.1/auth",
    "lucide-react": "https://esm.sh/lucide-react@0.263.1?external=react",
    "recharts": "https://esm.sh/recharts@2.12.0?external=react,react-dom",
    "@neondatabase/serverless": "https://esm.sh/@neondatabase/serverless@0.9.0",
    "react-paystack": "https://esm.sh/react-paystack@5.0.0?external=react,react-dom",
    "@google/genai": "https://esm.sh/@google/genai@0.0.1",
  }
}
</script>

    <style>
      body {
        background-color: #FDFCF8;
        color: #0a0a0a;
        font-family: Inter, sans-serif;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <!-- ✅ FIXED ENTRY POINT: Uses index.jsx -->
    <script type="text/babel" data-type="module" data-presets="react,typescript" src="./index.jsx"></script>
  </body>
</html>
